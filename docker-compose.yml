services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: nakama
    volumes:
      - triad_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nakama -d nakama']
      interval: 3s
      timeout: 3s
      retries: 10
    expose:
      - '5432'

  nakama:
    build:
      context: ./nakama
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - '/bin/sh'
      - '-ecx'
      - |
        /nakama/nakama migrate up --database.address "postgres://nakama:localdev@postgres:5432/nakama" &&
        exec /nakama/nakama \
          --config /nakama/data/local.yml \
          --database.address "postgres://nakama:localdev@postgres:5432/nakama" \
          --logger.level INFO
    ports:
      - '7350:7350'
      - '7351:7351'
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_NAKAMA_HOST: localhost
        VITE_NAKAMA_PORT: '7350'
        VITE_NAKAMA_SERVER_KEY: defaultkey
        VITE_NAKAMA_USE_SSL: 'false'
    ports:
      - '3000:80'
    depends_on:
      - nakama
    restart: unless-stopped

volumes:
  triad_pg:
