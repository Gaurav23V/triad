# Render Blueprint: https://render.com/docs/blueprint-spec
# Apply from the Render dashboard (Blueprint) after this file is on the default branch.

databases:
  - name: triad-db
    databaseName: nakama
    plan: free
    region: oregon

services:
  - type: web
    name: triad-nakama
    runtime: docker
    plan: free
    region: oregon
    repo: https://github.com/Gaurav23V/triad.git
    branch: main
    dockerfilePath: ./nakama/Dockerfile
    dockerContext: ./nakama
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: triad-db
          property: connectionString
